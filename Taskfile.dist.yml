# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

includes:
  qa:
    taskfile: ./taskfiles/Taskfile.qa.yml
    flatten: true
    vars:
      PROJECT: "{{.PROJECT}}"
  release: ./taskfiles/Taskfile.release.yml
  deploy: ./taskfiles/Taskfile.deploy.yml
  docs:
    taskfile: ./taskfiles/Taskfile.docs.yml
    dir: .
  # dev:
  #   taskfile: ./taskfiles/Taskfile.terraform-aws.yaml
  #   vars:
  #     TF_DIR: "{{.ROOT_DIR}}/terraform"
  #     ENVIRONMENT: dev
  # prod:
  #   taskfile: ./taskfiles/Taskfile.terraform-aws.yaml
  #   vars:
  #     TF_DIR: "{{.ROOT_DIR}}/terraform"
  #     ENVIRONMENT: prod

silent: true

vars:
  PROJECT: tiberio

tasks:
  default:
    desc: Show available commands
    cmd: task --list

  # ----------------------------------------------------------------------------
  # Project Initialization and Dependency Management
  # ----------------------------------------------------------------------------

  init:
    desc: Initialize project (install python, sync deps, setup pre-commit)
    vars:
      PYTHON_VERSION:
        sh: |
          grep 'requires-python' pyproject.toml | sed -E 's/.*>=?([0-9]+\.[0-9]+).*/\1/'
    cmds:
      - echo "🐍 Installing Python {{.PYTHON_VERSION}}..."
      - uv python install {{.PYTHON_VERSION}}
      - uv python pin {{.PYTHON_VERSION}}
      - echo "📦 Syncing dependencies..."
      - uv sync
      - echo "🔒 Installing pre-commit hooks..."
      - uv tool list | grep -q pre-commit || uv tool install pre-commit
      - uv run pre-commit install

  install:
    desc: Install all dependencies (including dev extras)
    cmd: uv sync

  sync:
    desc: Install dependencies using uv
    cmd: uv sync

  clean:
    desc: Clean cache and build artifacts
    ignore_error: true
    cmds:
      - rm -rf __pycache__/ .cache/ .state/ dist/ build/ coverage.xml .coverage
      - find . -type d -name "__pycache__" -exec rm -rf {} +
      - find . -type f -name "*.pyc" -delete

  # ----------------------------------------------------------------------------
  # Run the server
  # ----------------------------------------------------------------------------

  release:publish:
    desc: Build and publish all library modules to PyPI
    cmds:
      - uv build
      - uv publish
      - echo "✅ All modules published successfully"

  run:
    desc: Start the server and ngrok tunnel in the background (logs rotate at 5 MB)
    cmd: ./scripts/run-dev.sh

  stop:
    desc: Stop the background server and ngrok tunnel
    cmd: ./scripts/stop-dev.sh

  tunnel:
    desc: Start the ngrok tunnel and publish the beacon with its public URL
    cmd: ./scripts/start-ngrok-beacon.sh
